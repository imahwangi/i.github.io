
<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Imah Wangi</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <h1>IMAH WANGI</h1>
      <p>Luxury Perfume Collection</p>
    </header>
  
    <section class="controls">
      <input
        type="text"
        id="searchInput"
        placeholder="Cari parfum... (vanilla, fresh, oud)"
      />

      <div class="filters">
        <button data-filter="all">Semua</button>
        <button data-filter="soft">Soft</button>
        <button data-filter="elegant">Elegant</button>
        <button data-filter="floral">Floral</button>
        <button data-filter="fruity">Fruity</button>
        <button data-filter="oriental">Oriental</button>
        <button data-filter="fresh">Fresh</button>
        <button data-filter="sweet">Sweet</button>
        <button data-filter="woody">Woody</button>
      </div>
    </section>

    <section id="parfumList" class="parfum-list">
      <!-- KOSONG DI AWAL -->
    </section>

    <script src="js/data-parfum.js"></script>
    <script src="js/filter.js"></script>
  </body>
</html>
